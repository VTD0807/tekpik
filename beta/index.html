<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TekPik Beta Waitlist</title>
    <meta name="description" content="Join the exclusive TekPik beta waitlist to get early access to our smart tech gadget platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    
    <style>
        /* Minimalist Blue & Black Theme matching App Style */
        :root {
            --bg-body: #F8FAFC; 
            --bg-surface: #FFFFFF;
            --text-dark: #0F172A; 
            --text-muted: #64748B;
            --color-primary: #3B82F6; 
            --border-color: #E2E8F0;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --radius-input: 8px;
            --radius-card: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-body);
            background-color: var(--bg-body);
            color: var(--text-dark);
            font-size: 1rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2 { font-family: var(--font-display); color: var(--text-dark); }
        h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 12px; }
        
        /* Header */
        header {
            padding: 24px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2rem;
            color: var(--text-dark);
            text-decoration: none;
            letter-spacing: -0.05em;
        }
        .logo span { color: var(--color-primary); }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .waitlist-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 48px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .waitlist-subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 1.05rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-input);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            background-color: var(--bg-body);
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background-color: var(--bg-surface);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-input);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 12px;
            font-family: var(--font-body);
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Success Message */
        .success-state {
            display: none;
            text-align: center;
            padding: 24px 0;
        }
        
        .success-icon {
            font-size: 4rem;
            color: var(--color-primary);
            margin-bottom: 16px;
        }

    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">tekpik<span>&bull;</span></a>
    </header>

    <main>
        <div class="waitlist-card" id="form-container">
            <h1>Join the Beta</h1>
            <p class="waitlist-subtitle">Be the first to access our new platform.</p>
            
            <form id="beta-form" name="google-sheet-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="Name" placeholder="Enter your name" required />
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="Email" placeholder="you@example.com" required />
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="Phone" placeholder="+91 xxxxx xxxxx" required />
                </div>
                
                <button type="submit" class="btn-submit" id="submit-btn">Join Waitlist</button>
            </form>

            <div class="success-state" id="success-message">
                <div class="success-icon">✓</div>
                <h2>You're on the list!</h2>
                <p style="color: var(--text-muted); margin-top: 8px;">Keep an eye on your inbox for early access invites.</p>
            </div>
        </div>
    </main>

    <script>
        const scriptURL = '<YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL>'; 
        // 👆 INSTRUCTION: Replace <YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL> with the actual App Script deployment URL 
        // that targets your Google Sheet. It will automatically populate columns matching the 'name' attributes (Name, Email, Phone).

        const form = document.forms['google-sheet-form'];
        const submitBtn = document.getElementById('submit-btn');
        const formContainer = document.getElementById('beta-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';

            if (scriptURL === '<YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL>') {
                // Mock submission for demonstration if no actual script URL is provided yet
                console.log('Mock submission processing...');
                setTimeout(() => {
                    formContainer.style.display = 'none';
                    successMessage.style.display = 'block';
                }, 1000);
                return;
            }

            // Real submission
            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form) 
            })
            .then(response => {
                formContainer.style.display = 'none';
                successMessage.style.display = 'block';
            })
            .catch(error => {
                console.error('Error!', error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = 'Join Waitlist';
                alert('There was an issue submitting your request. Please try again.');
            });
        });
    </script>
</body>
</html>
