<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TekPik Beta — Join the Waitlist</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="refresh" content="0;url=https://tekpik.in/beta/?utm_source=instagram&utm_medium=story&utm_campaign=ig_beta&utm_content=swipeup" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,sans-serif;background:#FAFAF9;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;}
    .logo{font-size:2rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:12px;}
    .dot{width:8px;height:8px;border-radius:50%;background:#2563EB;display:inline-block;margin-left:4px;}
    p{font-size:0.9rem;color:#57534E;margin-bottom:20px;}
    .spinner{width:28px;height:28px;border:3px solid #E7E5E4;border-top-color:#2563EB;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div>
    <div class="logo">Tekpik<span class="dot"></span></div>
    <p>Taking you to the Beta waitlist...</p>
    <div class="spinner"></div>
  </div>
  <script>window.location.replace("https://tekpik.in/beta/?utm_source=instagram&utm_medium=story&utm_campaign=ig_beta&utm_content=swipeup");</script>
</body>
</html>
